[project]
name = "web3-agent-reputation"
version = "0.1.0.dev0"
description = "ERC-8004 Trustless Agents: web3.py external module (facts layer) + a pure reputation calculator"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "web3>=6",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/web3_agent_reputation"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "live: exercises a live public RPC endpoint (deselected by default; run via `-m live`)",
]
addopts = "-m 'not live'"

[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[dependency-groups]
dev = [
    "pytest>=7",
    "ruff>=0.6",
]
